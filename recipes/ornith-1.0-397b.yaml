# Recipe: Ornith-1.0-397B (INT4 W4A16 AutoRound) for DGX Spark GB10
# Source: https://forums.developer.nvidia.com/t/ornith-1-0-397b-released-has-anyone-tested-it-yet-or-found-the-best-inference-settings/374601
#
# deepreinforce-ai/Ornith-1.0-397B, requantized to INT4 (W4A16, group size 128,
# AutoRound/RTN) as Pilcothink/Ornith-1.0-397B-W4A16-AutoRound so it fits across
# 2x DGX Spark (GB10) at cross-node TP=2. Qwen-3.5-397B lineage (qwen3 tool/reason
# parsers). COMMUNITY / UNVERIFIED on this host — see README.md, especially the
# quant-quality and think-looping caveats.

recipe_version: "1"
name: Ornith-1.0-397B
model: Pilcothink/Ornith-1.0-397B-W4A16-AutoRound
runtime: vllm-distributed
min_nodes: 2

# Requires two Sparks (1 GB10 each -> tensor_parallel 2). Will not run solo.
cluster_only: true

# Forum recipe runs the `vllm-node-tf5` image built from eugr/spark-vllm-docker
# with `--tf5` (transformers 5.x). No canonical published tag — replace with the
# tag you build/push. See README.md ("ornith-1.0-397b — caveats").
container: eugr/spark-vllm-docker:vllm-node-tf5

metadata:
  description: Ornith-1.0-397B INT4 (W4A16 AutoRound) on 2x DGX Spark GB10, cross-node TP=2
  maintainer: community (NVIDIA developer forums — wolttam / gpieceoffice / whpthomas)
  source: https://forums.developer.nvidia.com/t/ornith-1-0-397b-released-has-anyone-tested-it-yet-or-found-the-best-inference-settings/374601
  base_model: deepreinforce-ai/Ornith-1.0-397B
  model_dtype: int4-w4a16
  quantization: autoround-rtn  # group size 128, pure RTN — see quality caveat in README

# Defaults — override on the CLI with -o key=value or the dedicated flags.
defaults:
  port: 8000
  host: 0.0.0.0
  served_model_name: Ornith-1.0-397B
  tensor_parallel: 2
  pipeline_parallel: 1
  gpu_memory_utilization: 0.88
  max_model_len: 262144
  max_num_seqs: 2
  max_num_batched_tokens: 4176
  kv_cache_dtype: fp8
  # Hard cap on KV cache size (~2.25 GiB) from wolttam's recipe — memory is tight
  # after the ~200 GB of INT4 weights. Raise only if a fit estimate says there's room.
  kv_cache_memory_bytes: 2415919104
  # In-image chat template (Ornith/Qwen-3.5 lineage; wolttam's recipe overrides the
  # model default with this). Must be resolvable inside the container.
  chat_template: unsloth.jinja
  # AutoRound weights are served via the instanttensor fast loader (built into the tf5 image).
  load_format: instanttensor

# Environment variables (kept in sync with ornith-1.0-397b.env — see README).
env:
  # From the forum recipe (Marlin INT4 kernel + memory profiler tweaks).
  VLLM_MARLIN_USE_ATOMIC_ADD: 1
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: 0
  # CUDA arch (GB10 = sm_121a / Blackwell) — repo convention, matters at build time.
  TORCH_CUDA_ARCH_LIST: 12.1a
  FLASHINFER_CUDA_ARCH_LIST: 12.1a
  # NCCL over the ConnectX-7 / InfiniBand-RoCE link between the two Sparks.
  # NB: the forum recipe did NOT specify NCCL tuning; these are the homelab's
  # standard IB settings. Adjust if cross-node all-reduce misbehaves.
  NCCL_NET: IB
  NCCL_IB_DISABLE: 0
  NCCL_IB_GID_INDEX: 3
  NCCL_CROSS_NIC: 1
  NCCL_CUMEM_ENABLE: 0
  NCCL_IGNORE_CPU_AFFINITY: 1
  NCCL_DEBUG: WARN

# Serve command template (wolttam's production INT4 recipe from the thread).
#
# Multi-node flags (--nnodes/--node-rank/--master-addr/--headless) are NOT
# hand-added — sparkrun's vllm-distributed runtime coordinates head/worker. The
# ray backend IS kept, as the thread's cross-node TP=2 recipe specifies it.
command: |
  vllm serve {model} \
      --served-model-name {served_model_name} \
      --host {host} \
      --port {port} \
      --trust-remote-code \
      --tensor-parallel-size {tensor_parallel} \
      --pipeline-parallel-size {pipeline_parallel} \
      --distributed-executor-backend ray \
      --load-format {load_format} \
      --chat-template {chat_template} \
      --max-model-len {max_model_len} \
      --max-num-seqs {max_num_seqs} \
      --max-num-batched-tokens {max_num_batched_tokens} \
      --kv-cache-dtype {kv_cache_dtype} \
      --kv-cache-memory-bytes {kv_cache_memory_bytes} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --enable-prefix-caching \
      --enable-auto-tool-choice \
      --tool-call-parser qwen3_xml \
      --reasoning-parser qwen3
