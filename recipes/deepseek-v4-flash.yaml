# Recipe: DeepSeek-V4-Flash "Aiden" recipe for DGX Spark GB10
# Source: https://forums.developer.nvidia.com/t/deepseek-v4-flash-aiden-recipe-from-reddit-1m-token-session-operational-cuda-12-1-tailored-for-dgx-spark-gb10/372268
#
# 1M-token context session across 2x DGX Spark (GB10), FP8 KV cache, MoE.
# COMMUNITY / UNVERIFIED on this host. See README.md for caveats — in particular
# the custom container entrypoint and multi-node coordination flags.

recipe_version: "1"
name: DeepSeek-V4-Flash
model: deepseek-ai/DeepSeek-V4-Flash
runtime: vllm-distributed
min_nodes: 2

# Requires two Sparks (1 GPU each -> tensor_parallel 2). Will not run solo.
cluster_only: true

# Custom community image with the dsv4-vllm-entrypoint + DeepSeek-V4 patches baked in.
container: aidendle94/sparkrun-vllm-ds4-gb10:production-ready

metadata:
  description: DeepSeek-V4-Flash on 2x DGX Spark GB10 (1M-token sessions, FP8 KV)
  maintainer: aidendle94 (NVIDIA developer forums / community)
  model_dtype: fp8
  vllm_version: "0.21.1"

# Defaults — override on the CLI with -o key=value or the dedicated flags.
defaults:
  port: 8000
  host: 0.0.0.0
  served_model_name: deepseek-v4-flash
  tensor_parallel: 2
  pipeline_parallel: 1
  gpu_memory_utilization: 0.82
  max_model_len: 1000000
  max_num_seqs: 6
  max_num_batched_tokens: 8192
  block_size: 256

# Environment variables (kept in sync with deepseek-v4-flash.env — see README).
env:
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
  VLLM_USE_B12X_MOE: 1
  VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: 256
  TORCH_CUDA_ARCH_LIST: 12.1a
  FLASHINFER_CUDA_ARCH_LIST: 12.1a
  NCCL_NET: IB
  NCCL_IB_DISABLE: 0
  NCCL_IB_GID_INDEX: 3
  NCCL_CROSS_NIC: 1
  NCCL_CUMEM_ENABLE: 0
  NCCL_IGNORE_CPU_AFFINITY: 1
  NCCL_DEBUG: WARN

# Serve command template.
#
# NOTE: the original forum command also passes manual multi-node flags:
#     --nnodes 2 --node-rank ${NODE_RANK} --master-addr ${MASTER_ADDR} \
#     --master-port 25000 ${HEADLESS:+--headless}
# Those are OMITTED here because sparkrun's vllm-distributed runtime performs the
# head/worker coordination itself (it manages a master port and node ranks, same
# as the other 2-Spark cluster recipes). If the custom entrypoint refuses to start
# without them, re-add the line above — sparkrun exposes NODE_RANK / MASTER_ADDR to
# the container env. See README.md.
command: |
  dsv4-vllm-entrypoint serve {model} \
      --served-model-name {served_model_name} \
      --host {host} \
      --port {port} \
      --trust-remote-code \
      --tensor-parallel-size {tensor_parallel} \
      --pipeline-parallel-size {pipeline_parallel} \
      --kv-cache-dtype fp8 \
      --block-size {block_size} \
      --max-model-len {max_model_len} \
      --max-num-seqs {max_num_seqs} \
      --max-num-batched-tokens {max_num_batched_tokens} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --enable-prefix-caching \
      --speculative-config '{"method":"mtp","num_speculative_tokens":2}' \
      --tokenizer-mode deepseek_v4 \
      --distributed-executor-backend mp \
      --tool-call-parser deepseek_v4 \
      --enable-auto-tool-choice \
      --reasoning-parser deepseek_v4 \
      --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}' \
      --default-chat-template-kwargs.thinking=true \
      --default-chat-template-kwargs.reasoning_effort=high \
      --enable-flashinfer-autotune
